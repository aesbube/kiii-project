@if (diagnosis) {
  <div class="app-card">
    <div class="app-card__header">
      <div class="app-card__header-icon">
        <mat-icon>assignment</mat-icon>
      </div>
      <div>
        <h2 class="app-card__title">Diagnosis details</h2>
        <div class="app-card__subtitle">{{ diagnosis.patientNameAndSurname || 'Patient record' }}</div>
      </div>
    </div>

    <div class="app-info-grid">
      <div class="app-info-item app-info-item--full">
        <span class="app-info-label">Patient</span>
        <span class="app-info-value">{{ diagnosis.patientNameAndSurname || '—' }}</span>
      </div>
      <div class="app-info-item app-info-item--full">
        <span class="app-info-label">Description</span>
        <span class="app-info-value">{{ diagnosis.description || '—' }}</span>
      </div>
      <div class="app-info-item app-info-item--full">
        <span class="app-info-label">Treatment</span>
        <span class="app-info-value">{{ diagnosis.treatment || '—' }}</span>
      </div>
    </div>
  </div>
} @else {
  <div class="spinner-container">
    <mat-spinner [diameter]="48"></mat-spinner>
  </div>
}
