<div class="search-box" [class.focused]="isInputFocused">
  <span class="search-icon" aria-hidden="true">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
         stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
  </span>

  <input
    #searchInput
    type="text"
    class="search-input"
    placeholder="Enter your appointment reference"
    [formControl]="searchControl2"
    (focus)="onFocus()"
    (blur)="onBlur()"
    (keyup.enter)="goToAppointment()"
  />

  @if (searchControl2.value) {
    <button type="button" class="icon-btn" aria-label="Clear" (click)="searchControl2.setValue('')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  }

  <button
    type="button"
    class="submit-btn"
    [disabled]="!searchControl2.value"
    (click)="goToAppointment()"
    aria-label="Search">
    Search
  </button>
</div>
